services:
  screentime-server:
    build: .
    container_name: screentime-server
    ports:
      - "7777:7777"
    environment:
      SCREENTIME_SERVER_DB_PATH: /data/server.db
      SCREENTIME_SERVER_HOST: 0.0.0.0
      SCREENTIME_SERVER_PORT: 7777
    volumes:
      - ./containers/screentime/data:/data
    restart: unless-stopped
